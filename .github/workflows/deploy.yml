name: Deploy to App Store & Google Play

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-submit:
    name: Build & Submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (production)
        run: eas build --platform ios --profile production --non-interactive

      - name: Build Android (production)
        run: eas build --platform android --profile production --non-interactive

      - name: Submit iOS to App Store
        run: eas submit --platform ios --profile production --non-interactive --latest

      - name: Submit Android to Google Play
        run: eas submit --platform android --profile production --non-interactive --latest
